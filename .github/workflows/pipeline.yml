name: Web Fullstack CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: web-fullstack-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static_checks:
    name: Static checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Static checks
        run: npm run check

  test:
    name: Test stage
    needs: static_checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Unit and regression tests
        run: npm test

      - name: End-to-end smoke check (frontend <-> backend)
        run: npm run check:e2e

  build:
    name: Build app
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

  pages_build:
    name: Build static site for GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build static app
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  pages_deploy:
    name: Deploy static site to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: pages_build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy_backend:
    name: CD deploy backend to public Render service
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Trigger Render deploy hook
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Skip deploy when hook secret is not configured
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: echo "Skipping backend deploy because RENDER_DEPLOY_HOOK_URL is not set."

  verify_public:
    name: Verify public server health and API
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy_backend
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL }}

    steps:
      - name: Skip public verification when required secrets are missing
        if: env.RENDER_DEPLOY_HOOK_URL == '' || env.PUBLIC_APP_URL == ''
        run: echo "Skipping public verification because RENDER_DEPLOY_HOOK_URL or PUBLIC_APP_URL is not set."

      - name: Wait for deployment
        if: env.RENDER_DEPLOY_HOOK_URL != '' && env.PUBLIC_APP_URL != ''
        run: sleep 25

      - name: Check public health endpoint with retries
        if: env.RENDER_DEPLOY_HOOK_URL != '' && env.PUBLIC_APP_URL != ''
        run: |
          for i in {1..18}; do
            if curl -fsS "$PUBLIC_APP_URL/api/health" | grep -q '"status":"ok"'; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check attempt $i failed, retrying in 10s"
            sleep 10
          done
          echo "Public health check failed after retries" >&2
          exit 1

      - name: Check public end-to-end data endpoint
        if: env.RENDER_DEPLOY_HOOK_URL != '' && env.PUBLIC_APP_URL != ''
        run: |
          payload=$(curl -fsS "$PUBLIC_APP_URL/api/account")
          echo "$payload" | grep -q '"account"' || (echo "Missing account payload" >&2; exit 1)
          echo "$payload" | grep -q '"history"' || (echo "Missing history payload" >&2; exit 1)
